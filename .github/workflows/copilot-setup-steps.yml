# This workflow is triggered by GitHub Copilot to set up
# the environment for the coding agent.
# https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

name: Copilot Setup Steps

on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - run: mvn dependency:resolve -settings ./.github/.m2/settings.xml --file pom.xml
        env:
          GH_ACCESS_TOKEN: ${{ secrets.READER_TOKEN }}
