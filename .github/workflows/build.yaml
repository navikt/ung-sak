name: "Bygg og deploy"
on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - '**.MD'
      - '.gitignore'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.github/*.yml'

jobs:
  build-app:
    name: Bygg docker image
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: navikt/sif-gha-workflows/.github/workflows/maven-build-app-db.yml@main
    with:
      runs-on: ${{ (github.ref_name == github.event.repository.default_branch && 'ubuntu-latest-8-cores' || 'ubuntu-latest-4-cores') }}
      java-version: 25
      skip-tests: true
      build-image: true
      push-image: ${{ github.ref_name == github.event.repository.default_branch}}
      upload-image: ${{ github.ref_name != github.event.repository.default_branch }}
      db_schema: ung_sak_unit
      pg_version: 16
      t-2c: "-T1C"
    secrets: inherit

  run-unit-tests:
    name: Enhetstester
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: navikt/sif-gha-workflows/.github/workflows/maven-build-app-db.yml@main
    with:
      runs-on: ${{ (github.ref_name == github.event.repository.default_branch && 'ubuntu-latest-8-cores' || 'ubuntu-latest-4-cores') }}
      java-version: 25
      skip-tests: false
      build-image: false
      push-image: false
      upload-image: false
      db_schema: ung_sak_unit
      pg_version: 16
      t-2c: "-T1C"
    secrets: inherit

  # Ved merge til master skal ny typescript klient pakke publiserast (viss merge fører til endringer i den)
  build-typescript-client:
    name: Bygg og publiser openapi typescript klient
    if: "${{ github.ref_name == github.event.repository.default_branch }}"
    needs: build-app
    permissions:
      contents: read
      packages: write
    uses: navikt/sif-gha-workflows/.github/workflows/typescript-client-publish.yml@openapi-next
    with:
      openapiFilePath: web/src/main/resources/openapi-ts-client/ung-sak.openapi.json
    secrets: inherit

  verdikjede-tester:
    name: Verdikjedetester
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      packages: read
    uses: navikt/sif-gha-workflows/.github/workflows/verdikjede-test-v2.yml@main
    if: ${{github.actor != 'dependabot[bot]'}}
    needs: build-app
    with:
      tag: ${{ needs.build-app.outputs.build-version }}
      suites: ${{ github.actor == 'dependabot[bot]' && 'ung' || 'ung,ung-tilbake,frontend-ung,aktivitetspenger' }}
      override_image_artifact_name: ${{ github.ref_name != github.event.repository.default_branch && needs.build-app.outputs.image-artifact-name || null }}
      image_version: ${{ needs.build-app.outputs.build-version }}

  deploy-dev:
    name: Deploy dev
    permissions:
      id-token: write
      contents: write
    if: github.ref_name == 'master'
    needs: [build-app, run-unit-tests]
    uses: navikt/sif-gha-workflows/.github/workflows/maven-deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: dev-gcp
      naiserator_file: deploy/dev-gcp.yml
    secrets: inherit

  cancel-previous:
    permissions:
      actions: write
    needs: [ build-typescript-client, deploy-dev, verdikjede-tester ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const currentRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const workflowId = currentRun.data.workflow_id;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              status: 'waiting',
            });
            for (const run of runs.data.workflow_runs) {
              if (run.run_number < currentRun.data.run_number) {
                await github.rest.actions.cancelWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
              }
            }


  # Sjekker at ny typescript klient kode for kode som blir rulla ut til prod er kompatibel med k9-sak-web prod versjon.
  # Viss denne feiler er det fare for at frontend vil feile med backend som blir forsøkt rulla ut.
  prod-typescript-check:
    name: Kompileringssjekk k9-sak-web latest_prod
    runs-on: ubuntu-latest
    needs: [cancel-previous]
    # environment satt her er det som skal ha "protection rule" i github settings hvis man ønsker godkjenning før
    # utrulling til prod. Kan fjernes helt hvis man ønsker automatisk utrulling til prod.
    #
    # Environment brukt i deploy-prod (maven-deploy.yml) under skal ikke ha protection rule. Hvis det har det blir det
    # krav om to godkjenninger før utrulling til prod.
    concurrency: prod
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: typescript-client-src
          path: /tmp/ung-sak-typescript-client
      - uses: navikt/k9-sak-web/.github/actions/check-compat-typescript-client@master
        with:
          readerToken: ${{ secrets.READER_TOKEN }}
          gitRef: latest_prod_ung
          newClientPath: /tmp/ung-sak-typescript-client


  deploy-prod:
    name: Deploy prod
    permissions:
      id-token: write
      contents: write
    if: github.ref_name == 'master'
    needs: [build-app, run-unit-tests, verdikjede-tester, deploy-dev, prod-typescript-check]
    uses: navikt/sif-gha-workflows/.github/workflows/maven-deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: prod-gcp
      naiserator_file: deploy/prod-gcp.yml
    secrets: inherit
